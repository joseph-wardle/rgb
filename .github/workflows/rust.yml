name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    #— Build every target (lib, bin, examples, tests, benches) in every crate
    - name: Build workspace
      run: cargo build --workspace --all-targets --verbose

    #— Run the unit & doc tests for every crate (incl. optional features if you want)
    - name: Run tests
      run: cargo test  --workspace --all-features --verbose

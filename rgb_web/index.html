<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>rgb — Game Boy Emulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            font-weight: 400;
        }
        #controls {
            margin-bottom: 1rem;
        }
        label {
            cursor: pointer;
            padding: 0.5rem 1.2rem;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            display: inline-block;
        }
        label:hover { background: #0f3460; }
        input[type="file"] { display: none; }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #0f3460;
        }
        #help {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>rgb</h1>
    <div id="controls">
        <label>
            Load ROM
            <input type="file" id="rom-input" accept=".gb,.bin">
        </label>
    </div>
    <div id="help">
        Arrow keys = D-pad &nbsp;|&nbsp;
        Z = B &nbsp;|&nbsp;
        X = A &nbsp;|&nbsp;
        Enter = Start &nbsp;|&nbsp;
        Right Shift = Select
    </div>

    <script type="module">
        import init, { start } from './pkg/rgb_web.js';

        async function run() {
            await init();

            document.getElementById('rom-input').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const buffer = await file.arrayBuffer();
                const rom = new Uint8Array(buffer);
                start(rom);
            });
        }

        run();
    </script>
</body>
</html>
